# Supabase local config for MiBalance EC
project_id = "mibalance-ec"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = [
  "http://127.0.0.1:3000",
  "http://localhost:3000/auth/reset",
  "http://127.0.0.1:3000/auth/reset"
]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false

[storage]
enabled = true
file_size_limit = "5MiB"

[studio]
enabled = true
port = 54323

